spring:
  application:
    name: LangPractice
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-5.4-mini
          temperature: 1
          max_completion_tokens: 500
  datasource:
    url: jdbc:postgresql://localhost:5432/lang_practice
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

application:
  topics:
    - Presente
    - Pretérito Indefinido
    - Pretérito Imperfecto
    - Pretérito Perfecto
    - Futuro Simple
    - Imperativo
    - Imperativo Negativo
    - Subjuntivo Presente
  base-url: ${APPLICATION_BASE_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai:
    requests-limit: ${AI_REQUESTS_LIMIT:20}
  security:
    google:
      client-id: ${GOOGLE_CLIENT_ID:fake-client-id}

scheduling:
  cron:
    # Cron for Telegram daily exercises sender; overridable via env var SEND_DAILY_EXERCISES_CRON
    send-daily-exercises: ${SEND_DAILY_EXERCISES_CRON:0 0 9 * * *}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:fake}
    username: ${TELEGRAM_BOT_USERNAME:fake}

logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web.client: DEBUG
