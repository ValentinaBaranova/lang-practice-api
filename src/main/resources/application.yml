spring:
  application:
    name: LangPractice
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.5
  datasource:
    url: jdbc:postgresql://localhost:5432/lang_practice
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

application:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai:
    requests-limit: ${AI_REQUESTS_LIMIT:20}

logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web.client: DEBUG
