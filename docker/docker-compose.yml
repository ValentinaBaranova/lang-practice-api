version: '3.5'
services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: lang_practice
    volumes:
      - ./pg-init-scripts:/docker-entrypoint-initdb.d
      - postgres:/Users/valentina.baranova/projects/lang-practice/api/docker/data/postgres-lang-practice
    ports:
      - "5432:5432"
    networks:
      - postgres
    restart: unless-stopped

volumes:
  postgres:

networks:
  postgres:
    driver: bridge
